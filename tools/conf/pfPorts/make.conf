ALLOW_UNSUPPORTED_SYSTEM=yes

# Set the compression format used by pkg-create(8)
PKG_COMPRESSION_FORMAT=	tgz

# Used by FreeSense-upgrade port to set pkg_set_version
FREESENSE_PKG_SET_VERSION=	%%PRODUCT_VERSION%%
FREESENSE_PACKAGE_TRAIN=	%%FREESENSE_PACKAGE_TRAIN%%

# Keep stock ports at FreeBSD's default options unless FreeSense needs a
# deliberate override. The complete package closure is built from the pinned
# ports tree.

# Individual ports options
.if ${.CURDIR:N*net/quagga*}=="" || ${.CURDIR:N*net/frr*}==""
CUR_ARCH!=	/usr/bin/uname -p
. if ${CUR_ARCH} == "armv7"
WITH_DEBUG=yes
. endif
.endif

.if ${.CURDIR:N*net/frr*}==""
ETCDIR=	/var/etc/frr
.endif

# Fetch distfiles from FreeBSD's distcache mirror FIRST (it still falls back to each port's
# own MASTER_SITES if a file isn't mirrored). Some unmaintained upstreams (e.g. padl.com for
# net/nss_ldap) serve drifted tarballs that fail the checksum, and FreeBSD's fetch does NOT
# try the backup mirror on a checksum MISMATCH (only on a download failure) — so on a clean
# build (empty distfiles cache) those ports break. Preferring the reliable mirror fixes it.
MASTER_SITE_OVERRIDE=	http://distcache.freebsd.org/ports-distfiles/${DIST_SUBDIR}/

# Follow FreeBSD's default Python so stock Python packages and their dependency
# closures remain compatible with the official package repository.
DEFAULT_VERSIONS=	go=1.25 php=8.5 ssl=base
# Widen PHP's compile-time fd_set (libc default is 1024). Injects -DFD_SETSIZE=3172 into PHP's
# build ONLY, sizing the bitmask used by stream_select()/socket_select() in userland PHP. This is
# LOAD-BEARING, not cargo-cult: etc/inc/pkg-utils.inc:157 and :1631 call stream_select() on the
# pkg-install / repo-update path — the exact code pfSense Bug #8845/#8895 crashed on when real
# hardware (SG-5100/C3558) assigned a pipe fd number above 1023. The value was escalated upstream
# 1024->2048->3172 for that reason. There is NO runtime/ini/ulimit escape; PHP must be compiled
# with this value. This is a cheap, correct trade against a documented hard crash. DO NOT remove
# without first migrating both stream_select() call sites to poll/kqueue.
PHP_FD_SETSIZE=		3172

. if ${.CURDIR:N*sysutils/check_reload_status*}==""
WITH_DEBUG=	yes
. endif

# devel/doxygen builds its OWN documentation (graphviz dot -> .map/.pdf -> LaTeX) as part of
# the port build, and that docs generation is NOT parallel-safe: under ALLOW_MAKE_JOBS=yes it
# races and dies ("problems opening map file ... for inclusion in the docs" / "problem writing
# FIG"), cascading to skip every dependent (bind, frr, kea, and ultimately security/FreeSense).
# Belt-and-suspenders for doxygen (a build dependency of DOCS-on ports bind/frr/kea):
#   - MAKE_JOBS_UNSAFE=yes : the maintainer's endorsed fix for this exact error -> serial build.
#   - OPTIONS_UNSET_FORCE+= DOCS : skip building doxygen's OWN docs (the failing build_doc step)
#     entirely. doxygen stays a fully functional tool for generating OTHER ports' docs.
# doxygen is a build-only tool (never installed on the box), so DOCS-off is harmless; it does
# make doxygen diverge from FreeBSD's defaults; it remains a small source build.
.if ${.CURDIR:N*devel/doxygen*}==""
MAKE_JOBS_UNSAFE=	yes
OPTIONS_UNSET_FORCE+=	DOCS
.endif

# Options for packages

# databases
databases_rrdtool_UNSET_FORCE=	PYTHON_MODULE RUBY_MODULE PERL_MODULE DEJAVU GRAPH

# devel
# git keeps its default options. It is used only by the optional gitsync feature,
# which file_exists()-guards /usr/local/bin/git.

# dns
dns_dnsmasq_UNSET_FORCE=	DNSSEC

dns_unbound_SET_FORCE=	LIBEVENT PYTHON

dns_bind920_SET_FORCE=GSSAPI_NONE
dns_bind920_UNSET_FORCE=FIXED_RRSET GSSAPI_BASE IDN LARGE_FILE LMDB

# emulators
emulators_open-vm-tools_UNSET_FORCE=DOCS FUSE LIBNOTIFY X11

# ftp
# curl keeps its default options. GSSAPI_BASE uses base-system Kerberos without
# adding another port dependency; there is no useful FreeSense-specific override.

# graphics
graphics_cairo_UNSET_FORCE=X11 XCB OPENGL

graphics_gd_SET_FORCE=ICONV
graphics_gd_UNSET_FORCE=FONTCONFIG XPM

graphics_graphviz_SET_FORCE=ICONV NLS
graphics_graphviz_UNSET_FORCE=DIGCOLA IPSEPCOLA PANGOCAIRO XPM

# lang
# gcc keeps its default options. It is not shipped by default (only listed in
# FreeSense.obsoletedfiles), and nothing has a runtime dependency on it.

# mail
mail_pear-Mail_SET_FORCE=	PEAR_NET_SMTP

# net
net_freeradius3_SET_FORCE=EXPERIMENTAL HEIMDAL LDAP MYSQL PERL PGSQL PYTHON SQLITE3

net_frr10_SET_FORCE=SNMP

# net/haproxy22 + net/haproxy29 option blocks removed — those version-variant ports no
# longer exist in the FreeBSD ports tree. FreeSense builds net/haproxy + net/haproxy-devel.
net_haproxy_SET_FORCE=OPENSSL SPCRE LUA PROMEX
net_haproxy_UNSET_FORCE=DPCRE DPCRE2 SPCRE2

net_haproxy-devel_SET_FORCE=OPENSSL SPCRE LUA
net_haproxy-devel_UNSET_FORCE=DPCRE DPCRE2 SPCRE2

net_libpcap_SET_FORCE=IPV6
net_libpcap_UNSET_FORCE=DAG

net_miniupnpd_UNSET_FORCE=	AUTODETECT_FW
net_miniupnpd_SET_FORCE=	CHECK_PORTINUSE IPV6 PF

net_mtr_UNSET_FORCE=X11

net_nss_ldap_UNSET_FORCE=SASL KERBEROS

net_ntp_UNSET_FORCE=	PERL_UTILS

# net-mgmt
net-mgmt_net-snmp_SET_FORCE=IPV6 MFD_REWRITES TLS
net-mgmt_net-snmp_UNSET_FORCE=AX_DISABLE_TRAP AX_SOCKONLY DOCS DUMMY JAIL MYSQL PYTHON SMUX TKMIB UNPRIVILEGED

net-mgmt_zabbix7-agent_SET_FORCE=IPV6

net-mgmt_zabbix7-proxy_SET_FORCE=IPMI LIBXML2 SQLITE SSH
net-mgmt_zabbix7-proxy_UNSET_FORCE=MYSQL MYSQLDV MDB5 MDB6 ORACLE PGSQL

# security
# Do not force security_ca_root_nss options. FreeBSD 16 marks ETCSYMLINK as
# OPTIONS_EXCLUDE; /etc/ssl/cert.pem is handled elsewhere.

security_opensc_SET_FORCE=	PCSC
security_opensc_UNSET_FORCE=	DOCS MANPAGES

security_openvpn_SET_FORCE=	X509ALTUSERNAME ASYNC_PUSH
security_openvpn_UNSET_FORCE=	EASYRSA

shells_scponly_SET_FORCE=CHROOT SCP WILDCARDS WINSCP
shells_scponly_UNSET_FORCE=DEFAULT_CHDIR DOCS GFTP RSYNC SVN SVNSERVE UNISON

security_strongswan_SET_FORCE=	CURL EAPDYNAMIC EAPRADIUS EAPSIMFILE GCM \
			IKEv1 UNBOUND XAUTH IPSECKEY PKCS11 PKI UNITY VICI VSTR SWANCTL
security_strongswan_UNSET_FORCE=	EAPAKA3GPP2 BUILTIN LIBC SMP

# nginx's LUA option uses luajit-openresty.  Building Suricata against the
# mutually exclusive luajit package makes pkg resolve the shared
# /usr/local/bin/luajit conflict by removing nginx and the WebGUI closure.
# Use stock Lua for Suricata so optional-package installs remain additive.
security_suricata_SET_FORCE=GEOIP HTP_PORT IPFW JSON LUA NSS PORTS_PCAP NETMAP HYPERSCAN REDIS
.if ${.CURDIR:N*security/suricata*}==""
CUR_ARCH!=	/usr/bin/uname -p
NATIVE_BUILD!=	/sbin/sysctl -qn kern.supported_archs | grep -q ${CUR_ARCH} && echo yes || /usr/bin/true
.if ${NATIVE_BUILD} != "yes"
security_suricata_UNSET_FORCE=LUAJIT PRELUDE SC TESTS RUST
.else
security_suricata_UNSET_FORCE=LUAJIT PRELUDE SC TESTS
.endif
.endif

security_xinetd_UNSET_FORCE=	XCONV

# sysutils
# flashrom is a System root and keeps the pinned FreeBSD port's default options.

sysutils_pftop_SET_FORCE=ALTQ

sysutils_syslog-ng_SET_FORCE=	SYS_SSL
sysutils_syslog-ng_UNSET_FORCE=	PORTS_SSL

# www
www_lighttpd_SET_FORCE=	NODELAY

www_nginx_SET_FORCE=	LUA

# Web Gateway 2.0 is intentionally pinned to Squid 7.  Squid 8 removed the
# sslcrtd certificate-generation interface used by selective/full inspection.
# TP_PF is required for FreeBSD transparent interception; the stock port's
# default TP_IPFW option is explicitly replaced.
www_squid_SET_FORCE=	AUTH_LDAP AUTH_SASL DELAY_POOLS FOLLOW_XFF FS_ROCK \
		GSSAPI_BASE ICAP IPV6 KQUEUE LARGEFILE SSL SSL_CRTD TDB TP_PF
www_squid_UNSET_FORCE=	HTCP TP_IPFW VIA_DB WCCP WCCPV2
