<svg id="logo" role="img" aria-labelledby="freesense-logo-svg" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" viewBox="0 0 282.8 84.2">
	<title id="freesense-logo-svg">FreeSense Logo</title>
	<!--
		FreeSense wordmark. Plain text-based placeholder logo so the product
		carries no pfSense trademarked artwork. Replace with a designed logo
		when one is available. The .logo-st0 class is themed by the CSS.
	-->
	<g class="logo-st0" fill="currentColor">
		<text x="6" y="54" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
		      font-size="44" font-weight="700" letter-spacing="-1">
			<tspan>Free</tspan><tspan font-weight="300">Sense</tspan>
		</text>
	</g>
</svg>
