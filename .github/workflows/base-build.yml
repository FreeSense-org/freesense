name: Build OS base (GitHub -> R2)

# Builds the FreeSense OS base + kernel core packages (FreeBSD world+kernel) on a
# GitHub-hosted runner inside a FreeBSD VM (vmactions), SIGNS them with the FreeSense
# key, and publishes a standalone, signed BASE REPO to R2 at base/<channel>/.
# (Option B: the base is its OWN repo, fully GitHub-owned; the self-hosted builder
# only owns the ports repo. Both repos live on pkg.freesense.org, both signed with
# the same fingerprint, merged by pkg on the box.)
#
# Heavy but INFREQUENT — only re-run when the freebsd-src pin (UPSTREAM_REF) or the
# freesense-freebsd-patches change. Each build is git-tagged os-base-<channel>-<ver>
# (immutable snapshot); the R2 base/<channel>/ path is the moving channel pointer the
# box upgrades against. Versions come from src/etc/version (devel=1.1.0.a.<datestamp>,
# release=1.0.0).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "freesense branch: main (devel) or RELENG_1_0 (stable)"
        type: choice
        options: [main, RELENG_1_0]
        default: main
      freebsd_release:
        description: "vmactions FreeBSD host release (newer host builds the pinned 16-CURRENT src)"
        required: false
        default: "15.0"

concurrency:
  group: base-build-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  base:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
    env:
      R2_BUCKET: freesense-pkg
    steps:
      - name: Free up runner disk (FreeBSD src+obj is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup \
                      /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Checkout freesense (build framework + source)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Map ref -> channel
        id: ch
        run: |
          case "${{ inputs.ref }}" in
            RELENG_1_0) echo "channel=v1_0_0" >> "$GITHUB_OUTPUT" ;;
            *)          echo "channel=devel"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build + sign + publish OS base repo (FreeBSD VM)
        uses: vmactions/freebsd-vm@v1
        env:
          FREESENSE_REPO_SIGNING_KEY: ${{ secrets.FREESENSE_REPO_SIGNING_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CHANNEL: ${{ steps.ch.outputs.channel }}
          R2_BUCKET: ${{ env.R2_BUCKET }}
        with:
          release: ${{ inputs.freebsd_release }}
          usesh: true
          copyback: true
          mem: 12288
          envs: 'FREESENSE_REPO_SIGNING_KEY R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_ACCOUNT_ID CHANNEL R2_BUCKET'
          prepare: |
            pkg install -y git archivers/gtar textproc/xmlstarlet ftp/curl net/rclone security/openssl
          run: |
            set -e
            SRC="$(pwd)"
            # ---- 1. minimal build.conf (no poudriere/nginx needed for base-only) ----
            cp build.conf.sample build.conf
            sed -i '' "s,/root/freesense-src,${SRC},g" build.conf
            rm -rf /root/freesense-freebsd-patches
            git clone --depth 1 https://github.com/FreeSense-org/freesense-freebsd-patches.git /root/freesense-freebsd-patches
            grep -q '^export POUDRIERE_BRANCH=' build.conf || echo 'export POUDRIERE_BRANCH=main' >> build.conf
            sed -i '' 's,^export PRODUCT_NAME_SUFFIX=.*,export PRODUCT_NAME_SUFFIX="",' build.conf
            # ---- 2. build world+kernel -> core packages ----
            echo '>>> --build-core (world + kernel + core packages)...'
            ./build.sh --build-core
            # ---- 3. set up signing (key from the GitHub secret) ----
            mkdir -p /root/sign
            printf '%s' "$FREESENSE_REPO_SIGNING_KEY" > /root/sign/repo.key
            chmod 0400 /root/sign/repo.key
            openssl rsa -in /root/sign/repo.key -pubout -out /root/sign/repo.pub 2>/dev/null
            fetch -qo /root/sign/sign.sh https://raw.githubusercontent.com/freebsd/pkg/master/scripts/sign.sh
            sed -i '' "s+ repo\.+ /root/sign/repo.+g" /root/sign/sign.sh
            chmod +x /root/sign/sign.sh
            # ---- 4. assemble a clean, SIGNED base repo (base/kernel/rc only — no
            #         default-config; that stays a poudriere port in the ports repo) ----
            core=$(ls -d tmp/*-core/All | head -1)
            [ -n "$core" ] || { echo 'ERROR: no core pkg dir'; exit 1; }
            BR=/root/base-repo
            rm -rf "$BR"; mkdir -p "$BR/All"
            cp "$core"/FreeSense-base-*.pkg "$core"/FreeSense-kernel-*.pkg "$core"/FreeSense-rc-*.pkg "$BR/All/"
            echo '>>> signing base repo...'
            pkg repo "$BR/" signing_command: /root/sign/sign.sh /root/sign/repo.key
            ls -1 "$BR" "$BR/All"
            # ---- 5. publish the signed base repo to R2 at base/<channel>/ ----
            ACCT=$(printf '%s' "$R2_ACCOUNT_ID" | tr -d '[:space:]' \
                   | sed -e 's#^http://##' -e 's#^https://##' -e 's#\.r2\..*##' -e 's#/.*##')
            echo ">>> publishing base repo -> R2:${R2_BUCKET}/base/${CHANNEL}/"
            env RCLONE_CONFIG_R2_TYPE=s3 RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
                RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
                RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
                RCLONE_CONFIG_R2_ENDPOINT="https://${ACCT}.r2.cloudflarestorage.com" \
                RCLONE_CONFIG_R2_REGION=auto RCLONE_CONFIG_R2_ACL=private \
                rclone sync --checksum "$BR/" "R2:${R2_BUCKET}/base/${CHANNEL}/"
            echo ">>> base repo published: https://pkg.freesense.org/base/${CHANNEL}/"

      - name: Determine base version + tag the build
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CH="${{ steps.ch.outputs.channel }}"
          PKG=$(ls tmp/*-core/All/FreeSense-base-*.pkg 2>/dev/null | head -1)
          [ -n "$PKG" ] || { echo "::error::no base pkg synced back"; exit 1; }
          VER=$(echo "$PKG" | sed -E 's,.*/FreeSense-base-(.+)\.pkg,\1,')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Base version: $VER (channel $CH)"
          TAG="os-base-${CH}-${VER}"
          git tag -f "$TAG" || true
          git push -f origin "refs/tags/${TAG}" || echo "tag push skipped"
          echo "Tagged $TAG"

      - name: Upload core packages (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: freesense-os-base-${{ steps.ch.outputs.channel }}
          path: tmp/*-core/All/FreeSense-{base,kernel,rc}-*.pkg
          retention-days: 14
