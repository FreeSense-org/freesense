name: Publish ISO to R2 (downloads)

# Uploads the built installer ISO(s) to the downloads R2 bucket (downloads.freesense.org).
# Runs on the self-hosted runner; the ISO lives in the FreeBSD builder VM, so we SSH in
# and rclone from there (same pattern + creds as publish-pkg). Manual trigger only.
on:
  workflow_dispatch:
    inputs:
      bucket:
        description: "R2 bucket for downloads"
        required: false
        default: "freesense-downloads"
      prune_only:
        description: "Only prune stale/de-branded (-CE) ISOs; skip the upload"
        type: boolean
        required: false
        default: false

concurrency:
  group: publish-iso
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, freesense-publish]
    env:
      VM: root@192.168.122.155
      VMKEY: /home/runner/.ssh/vmkey
      INSTALLER_DIR: /root/freesense-src/tmp/FreeSense/installer
    steps:
      - name: Sanity — an ISO exists on the VM
        if: ${{ !inputs.prune_only }}
        run: |
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "ls -1 ${INSTALLER_DIR}/*.iso.gz >/dev/null 2>&1 && echo 'iso present' || { echo 'ERROR: no .iso.gz in ${INSTALLER_DIR}'; exit 1; }"

      - name: Ensure rclone on the VM
        run: |
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "which rclone >/dev/null 2>&1 || env ASSUME_ALWAYS_YES=yes pkg install -y rclone >/dev/null 2>&1; rclone version | head -1"

      - name: Determine ISO + destination folder
        id: dest
        if: ${{ !inputs.prune_only }}
        run: |
          # Version/channel folder layout (downloads.freesense.org):
          #   release/<version>/      e.g. release/1.0.0/      (+ release/latest/ mirror)
          #   devel/<version>-<stamp>/ e.g. devel/1.1.0-20260627-1712/
          # so each build has its own folder + its own SHA256SUMS.txt (no collisions).
          NAME=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "ls -t ${INSTALLER_DIR}/*.iso.gz 2>/dev/null | head -1 | xargs -r basename")
          [ -n "$NAME" ] || { echo "::error::no .iso.gz in ${INSTALLER_DIR}"; exit 1; }
          base=${NAME%.iso.gz}
          case "$base" in
            *-RELEASE-*)     ch=release ;;
            *-DEVELOPMENT-*) ch=devel ;;
            *)               ch=other ;;
          esac
          ver=$(printf '%s' "$base" | sed -E 's/^[^-]+-([0-9][^-]*)-(RELEASE|DEVELOPMENT).*/\1/')
          stamp=$(printf '%s' "$base" | sed -E 's/.*-amd64-?//')
          if [ "$ch" = release ]; then dest="release/${ver}"; else dest="${ch}/${ver}${stamp:+-${stamp}}"; fi
          echo "Resolved: $NAME -> ${dest}/ (channel ${ch})"
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "channel=$ch"  >> "$GITHUB_OUTPUT"
          echo "dest=$dest"   >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256SUMS on the VM
        if: ${{ !inputs.prune_only }}
        run: |
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "cd ${INSTALLER_DIR} && sha256 -r *.iso.gz > SHA256SUMS.txt 2>/dev/null || sha256sum *.iso.gz > SHA256SUMS.txt; cat SHA256SUMS.txt"

      - name: Upload ISO(s) to R2
        if: ${{ !inputs.prune_only }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID_RAW: ${{ secrets.R2_ACCOUNT_ID }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACL: private
        run: |
          BUCKET="${{ github.event.inputs.bucket }}"
          DEST="${{ steps.dest.outputs.dest }}"
          CH="${{ steps.dest.outputs.channel }}"
          [ -n "$DEST" ] || { echo "ERROR: empty dest"; exit 1; }
          ACCT=$(printf '%s' "$R2_ACCOUNT_ID_RAW" | tr -d '[:space:]' \
                 | sed -e 's#^https\?://##' -e 's#\.r2\.cloudflarestorage\.com.*##' -e 's#/.*##')
          ENDPOINT="https://${ACCT}.r2.cloudflarestorage.com"
          RCENV="env \
               RCLONE_CONFIG_R2_TYPE='$RCLONE_CONFIG_R2_TYPE' \
               RCLONE_CONFIG_R2_PROVIDER='$RCLONE_CONFIG_R2_PROVIDER' \
               RCLONE_CONFIG_R2_ACCESS_KEY_ID='$RCLONE_CONFIG_R2_ACCESS_KEY_ID' \
               RCLONE_CONFIG_R2_SECRET_ACCESS_KEY='$RCLONE_CONFIG_R2_SECRET_ACCESS_KEY' \
               RCLONE_CONFIG_R2_ENDPOINT='$ENDPOINT' \
               RCLONE_CONFIG_R2_REGION='$RCLONE_CONFIG_R2_REGION' \
               RCLONE_CONFIG_R2_ACL='$RCLONE_CONFIG_R2_ACL' \
               rclone"
          echo ">>> Uploading -> R2:${BUCKET}/${DEST}/"
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "${RCENV} copy --checksum --transfers 4 \
                 --include '*.iso.gz' --include 'SHA256SUMS.txt' \
                 '${INSTALLER_DIR}/' 'R2:${BUCKET}/${DEST}/'"
          # For a release, mirror it to a stable 'latest' URL.
          if [ "$CH" = "release" ]; then
            echo ">>> Mirroring -> R2:${BUCKET}/release/latest/"
            ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
              "${RCENV} sync --checksum 'R2:${BUCKET}/${DEST}/' 'R2:${BUCKET}/release/latest/'"
          fi
          echo ">>> Done:"
          echo ">>>   https://downloads.freesense.org/${DEST}/${{ steps.dest.outputs.name }}"
          if [ "$CH" = "release" ]; then echo ">>>   https://downloads.freesense.org/release/latest/${{ steps.dest.outputs.name }}"; fi

      - name: Update releases.json manifest (powers the website download page)
        if: ${{ !inputs.prune_only && steps.dest.outputs.channel != 'other' }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID_RAW: ${{ secrets.R2_ACCOUNT_ID }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACL: private
        run: |
          BUCKET="${{ github.event.inputs.bucket }}"
          DEST="${{ steps.dest.outputs.dest }}"
          CH="${{ steps.dest.outputs.channel }}"
          NAME="${{ steps.dest.outputs.name }}"
          VER="${{ steps.dest.outputs.version }}"
          ACCT=$(printf '%s' "$R2_ACCOUNT_ID_RAW" | tr -d '[:space:]' \
                 | sed -e 's#^https\?://##' -e 's#\.r2\.cloudflarestorage\.com.*##' -e 's#/.*##')
          ENDPOINT="https://${ACCT}.r2.cloudflarestorage.com"
          # The merge script reads the existing manifest from R2, updates THIS channel's
          # entry, and writes it back. Written to a FILE + run with </dev/null (poudriere/
          # ssh otherwise swallow the heredoc as stdin and truncate the rest of the step).
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" "cat > /root/mk-releases.sh" <<'REMOTE'
          set -e
          which jq >/dev/null 2>&1 || env ASSUME_ALWAYS_YES=yes pkg install -y jq >/dev/null 2>&1
          cd "$INSTALLER_DIR"
          # build-stamp from the ISO name (e.g. 20260628-1558); empty for RELEASE images
          STAMP=$(printf '%s' "$NAME" | sed -E 's/.*-amd64-?//; s/\.iso\.gz$//')
          if [ "$CH" = release ]; then
            KEY=stable; URL="https://downloads.freesense.org/release/latest/${NAME}"; DISP="${VER}-RELEASE"
          else
            KEY=devel;  URL="https://downloads.freesense.org/${DEST}/${NAME}";        DISP="${VER}${STAMP:+-$STAMP}"
          fi
          SIZE=$(stat -f %z "$NAME" 2>/dev/null || stat -c %s "$NAME")
          SHA=$(grep "$NAME" SHA256SUMS.txt | awk '{print $1; exit}')
          DATE=$(date -u +%Y-%m-%d)

          # ---- changelog: commits in freesense-src since the last published ISO (this channel) ----
          CUR_SHA=$(git -C "$SRC" rev-parse HEAD 2>/dev/null || echo "")
          LAST_SHA=$(rclone cat "R2:${BUCKET}/iso-meta/last-sha-${KEY}" 2>/dev/null | tr -dc 0-9a-f)
          if [ -n "$CUR_SHA" ] && [ -n "$LAST_SHA" ] && git -C "$SRC" cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null; then
            RANGE="${LAST_SHA}..${CUR_SHA}"
          else
            RANGE="-25"   # first run / unknown baseline: last 25 commits
          fi
          git -C "$SRC" log $RANGE --no-merges --pretty=format:'%s' 2>/dev/null \
            | grep -viE '^(merge|bump version|ci:|\[ci\]|wip\b)' | head -40 > /tmp/cl.txt || true
          CHANGELOG=$(jq -R -s 'split("\n") | map(select(length>0))' /tmp/cl.txt 2>/dev/null)
          [ -n "$CHANGELOG" ] || CHANGELOG='[]'

          ENTRY=$(jq -n --arg v "$DISP" --arg iso "$NAME" --arg url "$URL" \
                        --argjson size "${SIZE:-0}" --arg sha "$SHA" --arg date "$DATE" \
                        --argjson changelog "$CHANGELOG" \
                        '{version:$v, iso:$iso, url:$url, size:$size, sha256:$sha, date:$date, changelog:$changelog}')

          # start from the existing manifest if it's valid JSON, else {}
          rclone cat "R2:${BUCKET}/releases.json" 2>/dev/null | jq '.' > /tmp/cur.json 2>/dev/null || echo '{}' > /tmp/cur.json
          [ -s /tmp/cur.json ] || echo '{}' > /tmp/cur.json

          # set new latest; push the PREVIOUS latest into this channel's history
          # (slim entries, dedup by version, newest first, cap 12).
          jq --arg k "$KEY" --argjson e "$ENTRY" --arg date "$DATE" '
            (.channels[$k]) as $old
            | .channels = (.channels // {})
            | (if ($old != null and (($old.version // "") != $e.version))
                 then ([ ($old | {version,iso,url,size,sha256,date}) ] + ($old.history // []))
                 else ($old.history // []) end) as $hist
            | .channels[$k] = ($e + {history: ($hist | unique_by(.version) | reverse | .[0:12])})
            | .generated = $date
          ' /tmp/cur.json > /tmp/releases.json
          echo "--- releases.json ---"; cat /tmp/releases.json
          rclone copyto --s3-no-check-bucket --header-upload "Content-Type: application/json" \
            /tmp/releases.json "R2:${BUCKET}/releases.json"
          # remember this commit as the baseline for the next changelog
          [ -n "$CUR_SHA" ] && printf '%s' "$CUR_SHA" | rclone rcat --s3-no-check-bucket "R2:${BUCKET}/iso-meta/last-sha-${KEY}" || true
          echo ">>> manifest published: https://downloads.freesense.org/releases.json"
          REMOTE
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "RCLONE_CONFIG_R2_TYPE='$RCLONE_CONFIG_R2_TYPE' \
             RCLONE_CONFIG_R2_PROVIDER='$RCLONE_CONFIG_R2_PROVIDER' \
             RCLONE_CONFIG_R2_ACCESS_KEY_ID='$RCLONE_CONFIG_R2_ACCESS_KEY_ID' \
             RCLONE_CONFIG_R2_SECRET_ACCESS_KEY='$RCLONE_CONFIG_R2_SECRET_ACCESS_KEY' \
             RCLONE_CONFIG_R2_ENDPOINT='$ENDPOINT' \
             RCLONE_CONFIG_R2_REGION='$RCLONE_CONFIG_R2_REGION' \
             RCLONE_CONFIG_R2_ACL='$RCLONE_CONFIG_R2_ACL' \
             BUCKET='$BUCKET' DEST='$DEST' CH='$CH' NAME='$NAME' VER='$VER' INSTALLER_DIR='$INSTALLER_DIR' SRC='/root/freesense-src' \
             sh /root/mk-releases.sh < /dev/null"

      - name: Prune stale artifacts (-CE + old flat root layout)
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID_RAW: ${{ secrets.R2_ACCOUNT_ID }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACL: private
        run: |
          # Two cleanups, both safe (versioned folders live at depth >= 2, untouched):
          #  1) de-branded -CE artifacts anywhere (same release, old name).
          #  2) the OLD flat root-level layout (*.iso.gz + SHA256SUMS.txt at the bucket
          #     root) — superseded by release/<ver>/ + devel/<ver>-<stamp>/. --max-depth 1
          #     restricts this to the root so versioned folders are never affected.
          BUCKET="${{ github.event.inputs.bucket }}"
          ACCT=$(printf '%s' "$R2_ACCOUNT_ID_RAW" | tr -d '[:space:]' \
                 | sed -e 's#^https\?://##' -e 's#\.r2\.cloudflarestorage\.com.*##' -e 's#/.*##')
          ENDPOINT="https://${ACCT}.r2.cloudflarestorage.com"
          RCENV="env \
               RCLONE_CONFIG_R2_TYPE='$RCLONE_CONFIG_R2_TYPE' \
               RCLONE_CONFIG_R2_PROVIDER='$RCLONE_CONFIG_R2_PROVIDER' \
               RCLONE_CONFIG_R2_ACCESS_KEY_ID='$RCLONE_CONFIG_R2_ACCESS_KEY_ID' \
               RCLONE_CONFIG_R2_SECRET_ACCESS_KEY='$RCLONE_CONFIG_R2_SECRET_ACCESS_KEY' \
               RCLONE_CONFIG_R2_ENDPOINT='$ENDPOINT' \
               RCLONE_CONFIG_R2_REGION='$RCLONE_CONFIG_R2_REGION' \
               RCLONE_CONFIG_R2_ACL='$RCLONE_CONFIG_R2_ACL' \
               rclone"
          echo ">>> Pruning de-branded -CE artifacts (any depth)"
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "${RCENV} delete --include '*-CE-*.iso.gz' 'R2:${BUCKET}/' -v"
          echo ">>> Pruning old flat root-level files (migration to versioned folders)"
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "${RCENV} delete --max-depth 1 --include '*.iso.gz' --include 'SHA256SUMS.txt' 'R2:${BUCKET}/' -v"
          echo ">>> Remaining objects (recursive):"
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "${RCENV} lsf -R 'R2:${BUCKET}/'"
