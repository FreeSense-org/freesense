name: Build ISO

# Rebuilds the FreeSense pkg repo + installer ISO on the self-hosted builder.
# The runner lives on the Debian host; the build happens in the FreeBSD builder
# VM, so we git-pull + launch the build there (detached) and poll a sentinel.
#
# Manual trigger only (self-hosted runner = code exec on the host; never PRs).
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to build: main (devel channel) or RELENG_1_0 (stable channel)"
        type: choice
        options: [main, RELENG_1_0]
        default: main
      publish_after:
        description: "Run the publish-pkg sync to R2 after a successful build"
        type: boolean
        required: false
        default: false

concurrency:
  group: freesense-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, freesense-publish]
    timeout-minutes: 300
    env:
      VM: root@192.168.122.155
      VMKEY: /home/runner/.ssh/vmkey
      SRC: /root/freesense-src
    steps:
      - name: Sanity — reach the builder VM
        run: |
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "test -d ${SRC}/.git && echo 'builder VM + src checkout present'"

      - name: Update source on the VM
        env:
          REF: ${{ inputs.ref }}
        run: |
          # Check out the requested branch in BOTH repos (same branch name in each:
          # main = devel channel, RELENG_1_0 = stable channel). -B resets the local
          # branch to origin, so switching channels is clean and idempotent.
          # Fetch the specific ref by name (the VM clones are single-branch, so a bare
          # 'git fetch origin' won't pull other branches). FETCH_HEAD = the fetched tip.
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "cd ${SRC} && git fetch --quiet origin '${REF}' && git checkout -B '${REF}' FETCH_HEAD && \
             echo 'freesense-src:' && git log -1 --oneline && echo 'version:' && cat src/etc/version"
          # CRITICAL: security/FreeSense-system builds from the freesense-src.tar.gz DISTFILE,
          # not the live checkout. Re-tar it from the freshly-checked-out source so source
          # changes (version, GUI, de-netgate) actually reach the built system package.
          # (Exclude tmp/ build-obj — GBs — and .git/logs.)
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "rm -f /usr/ports/distfiles/freesense-src.tar.gz && \
             tar czf /usr/ports/distfiles/freesense-src.tar.gz -C $(dirname ${SRC}) \
               --exclude='$(basename ${SRC})/.git' --exclude='$(basename ${SRC})/tmp' --exclude='$(basename ${SRC})/logs' \
               '$(basename ${SRC})' && \
             echo 'distfile refreshed:' && ls -lh /usr/ports/distfiles/freesense-src.tar.gz"
          # The ports overlay (freesense-ports) is copied onto the poudriere tree by
          # freesense-ports-overlay.sh but never pulled — refresh it to the same branch.
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "cd /root/freesense-ports && git fetch --quiet origin '${REF}' && git checkout -B '${REF}' FETCH_HEAD && \
             echo 'freesense-ports:' && git log -1 --oneline"
          # build.conf is generated from build.conf.sample by the provisioner and is gitignored,
          # so git reset can't update it. Keep the repo-server URL in sync with the sample
          # (idempotent: only rewrites a stale pkg+https:// prefix).
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "sed -i '' 's,pkg+https://,https://,g' ${SRC}/build.conf && \
             grep -q '^export POUDRIERE_BRANCH=' ${SRC}/build.conf || echo 'export POUDRIERE_BRANCH=main' >> ${SRC}/build.conf && \
             echo 'build.conf:' && grep -E 'PKG_REPO_SERVER|POUDRIERE_BRANCH' ${SRC}/build.conf | grep -v '^#'"

      - name: Force-clean the FreeSense core packages
        run: |
          # poudriere caches packages by version. A RELEASE build's core version is
          # clean (e.g. 1.0.0, no timestamp), so an unchanged version would REUSE a
          # stale cached package even though the source (de-netgate/GUI) changed.
          # Delete the cached CORE packages (built from the freesense-src distfile) so
          # they recompile from the fresh source. FreeSense-pkg-* plugins (upstream
          # source) are deliberately NOT touched, so they stay cached/fast.
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "rm -f /usr/local/poudriere/data/packages/*/All/FreeSense-system-*.pkg \
                   /usr/local/poudriere/data/packages/*/All/FreeSense-ce-*.pkg \
                   /usr/local/poudriere/data/packages/*/All/FreeSense-repo-*.pkg \
                   /usr/local/poudriere/data/packages/*/All/FreeSense-default-config*.pkg \
                   /usr/local/poudriere/data/packages/*/All/php*-FreeSense-module-*.pkg \
                   /usr/local/poudriere/data/packages/*/All/FreeSense-[0-9]*.pkg 2>/dev/null; \
             echo 'core packages cleared (plugins kept)'"

      - name: Launch build (detached)
        run: |
          # gh run cancel kills the workflow job but NOT a nohup'd build on the VM, so
          # first kill any stale build/poudriere from a previous run to avoid a
          # concurrent-build collision (poudriere cleans its own stale mounts on start).
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "pkill -f tools/ci/run-build.sh 2>/dev/null; pkill -f /build.sh 2>/dev/null; pkill -f poudriere 2>/dev/null; sleep 3; echo 'stale build processes cleared'"
          # Clear any stale sentinel, then launch the driver detached on the VM.
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "rm -f /root/build-ci.rc /root/build-ci.log; \
             nohup sh -c 'sh ${SRC}/tools/ci/run-build.sh; echo \$? > /root/build-ci.rc' \
               > /root/build-ci.boot.log 2>&1 & \
             sleep 2; echo 'launched build pid group; boot log:'; cat /root/build-ci.boot.log"

      - name: Wait for build (poll sentinel)
        run: |
          # Poll up to ~4h (480 * 30s). Stream a tail each tick so progress is visible.
          for i in $(seq 1 480); do
            if ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" 'test -f /root/build-ci.rc'; then
              RC=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" 'cat /root/build-ci.rc')
              echo "=== build finished, rc=$RC — last 60 log lines: ==="
              ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" 'tail -60 /root/build-ci.log'
              [ "$RC" = "0" ] || { echo "::error::build failed (rc=$RC)"; exit 1; }
              echo "build OK"
              exit 0
            fi
            LAST=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" 'tail -1 /root/build-ci.log 2>/dev/null' || true)
            echo "[tick $i] building... ${LAST}"
            sleep 30
          done
          echo "::error::build timed out after ~4h"
          exit 1

      - name: Locate the ISO
        id: iso
        run: |
          ISO=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "ls -t /root/freesense-src/tmp/FreeSense/installer/*.iso.gz /root/freesense-src/tmp/FreeSense/installer/*.iso 2>/dev/null | head -1" || true)
          if [ -z "$ISO" ]; then
            ISO=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
              "find /root /usr -path '*installer*' \\( -name '*.iso.gz' -o -name '*.iso' \\) 2>/dev/null | xargs ls -t 2>/dev/null | head -1" || true)
          fi
          [ -n "$ISO" ] || { echo "::error::no ISO produced"; exit 1; }
          SIZE=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" "ls -lh '$ISO' | awk '{print \$5}'")
          echo "Built ISO: $ISO ($SIZE)"
          echo "iso_path=$ISO" >> "$GITHUB_OUTPUT"
          echo "iso_name=$(basename "$ISO")" >> "$GITHUB_OUTPUT"

      - name: Fetch ISO to the runner
        run: |
          scp -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes \
            "${VM}:${{ steps.iso.outputs.iso_path }}" "./${{ steps.iso.outputs.iso_name }}"
          ls -lh "./${{ steps.iso.outputs.iso_name }}"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: freesense-iso
          path: ${{ steps.iso.outputs.iso_name }}
          retention-days: 14

      - name: Publish to R2 (optional)
        if: ${{ inputs.publish_after }}
        run: echo "publish_after requested — run the 'Publish pkg repo to R2' workflow to sync."
