name: R2 bucket maintenance

# Inspect or clean the pkg R2 bucket. Runs rclone on the builder VM (has the
# repo + we pass R2 creds inline, same pattern as publish-pkg). Manual only.
on:
  workflow_dispatch:
    inputs:
      action:
        description: "inspect (read-only) or clean (purge junk + abort multipart)"
        type: choice
        options: [inspect, clean]
        default: inspect

concurrency:
  group: r2-maint
  cancel-in-progress: false

jobs:
  maint:
    runs-on: [self-hosted, freesense-publish]
    env:
      VM: root@192.168.122.155
      VMKEY: /home/runner/.ssh/vmkey
      R2_BUCKET: freesense-pkg
      KEEP_PREFIX: FreeSense_master_amd64-FreeSense_devel
    steps:
      - name: Run rclone maintenance
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID_RAW: ${{ secrets.R2_ACCOUNT_ID }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACL: private
        run: |
          ACTION="${{ github.event.inputs.action }}"
          ACCT=$(printf '%s' "$R2_ACCOUNT_ID_RAW" | tr -d '[:space:]' \
                 | sed -e 's#^https\?://##' -e 's#\.r2\.cloudflarestorage\.com.*##' -e 's#/.*##')
          ENDPOINT="https://${ACCT}.r2.cloudflarestorage.com"
          RC="env \
               RCLONE_CONFIG_R2_TYPE='$RCLONE_CONFIG_R2_TYPE' \
               RCLONE_CONFIG_R2_PROVIDER='$RCLONE_CONFIG_R2_PROVIDER' \
               RCLONE_CONFIG_R2_ACCESS_KEY_ID='$RCLONE_CONFIG_R2_ACCESS_KEY_ID' \
               RCLONE_CONFIG_R2_SECRET_ACCESS_KEY='$RCLONE_CONFIG_R2_SECRET_ACCESS_KEY' \
               RCLONE_CONFIG_R2_ENDPOINT='$ENDPOINT' \
               RCLONE_CONFIG_R2_REGION='$RCLONE_CONFIG_R2_REGION' \
               RCLONE_CONFIG_R2_ACL='$RCLONE_CONFIG_R2_ACL' \
               rclone"
          run() { ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" "$1"; }

          BASE="R2:${R2_BUCKET}/${KEEP_PREFIX}"
          # Real repo dirs to KEEP inside the prefix; everything else is recursion junk.
          # (All = packages, Latest = pkg bootstrap. Top-level metadata files are kept too.)
          echo "===== TOTAL BUCKET SIZE ====="
          run "$RC size 'R2:${R2_BUCKET}'"
          echo "===== SUBDIRS INSIDE ${KEEP_PREFIX} (this is where the junk lives) ====="
          run "$RC lsf '${BASE}' --dirs-only"
          echo "===== TOP-LEVEL FILES INSIDE PREFIX (metadata — keep) ====="
          run "$RC lsf '${BASE}' --files-only"
          echo "===== SIZE of All/ and Latest/ (the real payload) ====="
          run "$RC size '${BASE}/All' 2>/dev/null || echo '(no All/)'"
          run "$RC size '${BASE}/Latest' 2>/dev/null || echo '(no Latest/)'"

          if [ "$ACTION" = "clean" ]; then
            echo "===== CLEAN: purge junk subdirs inside the prefix (keep All, Latest) ====="
            for d in $(run "$RC lsf '${BASE}' --dirs-only" | tr -d '\r'); do
              name="${d%/}"
              case "$name" in
                All|Latest)
                  echo "  KEEP  ${name}/" ;;
                *)
                  echo "  PURGE ${name}/"
                  run "$RC purge '${BASE}/${name}'" ;;
              esac
            done
            echo "===== CLEAN: abort any incomplete multipart uploads ====="
            run "$RC cleanup 'R2:${R2_BUCKET}'" || echo "(cleanup not supported)"
            echo "===== POST-CLEAN TOTAL SIZE ====="
            run "$RC size 'R2:${R2_BUCKET}'"
          fi
