name: Publish pkg repo to R2

# Publishes the signed poudriere package repo to pkg.freesense.org (Cloudflare R2).
# Runs on the self-hosted runner (Debian host); the repo lives in the FreeBSD builder VM,
# so we SSH into the VM and run rclone there, passing R2 creds via env (no rclone.conf).
#
# Manual trigger only (self-hosted runner = code exec on the host; never expose to PRs).
on:
  workflow_dispatch:
    inputs:
      poudriere_repo:
        description: "Poudriere repo dir name on the VM (blank = newest signed build, devel or stable)"
        required: false
        default: ""
      repo_path_segment:
        description: "Bucket path segment (blank = auto-detect from the box's FreeSense-repo.conf)"
        required: false
        default: ""

concurrency:
  group: publish-pkg
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, freesense-publish]
    env:
      VM: root@192.168.122.155
      VMKEY: /home/runner/.ssh/vmkey
      R2_BUCKET: freesense-pkg
      PACKAGES_ROOT: /usr/local/poudriere/data/packages
    steps:
      - name: Determine poudriere repo (newest signed build, or override)
        id: repo
        run: |
          REPO="${{ github.event.inputs.poudriere_repo }}"
          if [ -n "$REPO" ]; then
            DIR="${PACKAGES_ROOT}/${REPO}"
          else
            # newest repo dir that has a signed packagesite (handles devel + stable jails)
            DIR=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
              "ls -td ${PACKAGES_ROOT}/*/ 2>/dev/null | while read d; do [ -f \"\${d}.latest/packagesite.pkg\" ] && { echo \"\${d%/}\"; break; }; done")
          fi
          [ -n "$DIR" ] || { echo "::error::no signed poudriere repo found"; exit 1; }
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "test -f '${DIR}/.latest/packagesite.pkg'" || { echo "::error::no signed packagesite.pkg in $DIR"; exit 1; }
          echo "Publishing poudriere repo: $DIR"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Ensure rclone on the VM
        run: |
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "which rclone >/dev/null 2>&1 || env ASSUME_ALWAYS_YES=yes pkg install -y rclone >/dev/null 2>&1; rclone version | head -1"

      - name: Determine repo path segment
        id: seg
        run: |
          # Auto-detect from the RESOLVED box repo conf the build stages (setup_pkg_repo
          # writes it to STAGE_CHROOT_DIR/PRODUCT_SHARE_DIR with %% placeholders resolved:
          # devel -> FreeSense_master_amd64-FreeSense_devel, release -> FreeSense_v1_0_0_...).
          # The regex skips any line still containing % (unresolved template).
          SEG=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "grep -hoE 'FreeSense_[^/\"%]+-FreeSense_[^/\"%]+' /root/freesense-src/tmp/stage-dir/usr/local/share/FreeSense/FreeSense-repo.conf 2>/dev/null | head -1" || true)
          if [ -z "$SEG" ]; then
            # Fallback: any resolved FreeSense.conf under the staged image.
            SEG=$(ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
              "grep -rhoE 'FreeSense_[^/\"%]+-FreeSense_[^/\"%]+' /root/freesense-src/tmp/stage-dir/usr/local/etc/pkg/repos/ /root/freesense-src/tmp/stage-dir/usr/local/share/FreeSense/ 2>/dev/null | sort -u | head -1" || true)
          fi
          if [ -z "$SEG" ]; then
            SEG="${{ github.event.inputs.repo_path_segment }}"
            echo "auto-detect empty; using input segment (blank = will fail below)"
          fi
          echo "Using repo path segment: $SEG"
          echo "segment=$SEG" >> "$GITHUB_OUTPUT"

      - name: Publish to R2 (rclone sync)
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID_RAW: ${{ secrets.R2_ACCOUNT_ID }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACL: private
        run: |
          SEG="${{ steps.seg.outputs.segment }}"
          REPO_DIR="${{ steps.repo.outputs.dir }}"
          [ -n "$SEG" ] || { echo "ERROR: empty repo path segment"; exit 1; }
          [ -n "$REPO_DIR" ] || { echo "ERROR: empty poudriere repo dir"; exit 1; }
          # Normalize the account id: accept a bare id OR a full endpoint/S3 URL, strip whitespace.
          ACCT=$(printf '%s' "$R2_ACCOUNT_ID_RAW" | tr -d '[:space:]' \
                 | sed -e 's#^https\?://##' -e 's#\.r2\.cloudflarestorage\.com.*##' -e 's#/.*##')
          ENDPOINT="https://${ACCT}.r2.cloudflarestorage.com"
          DEST="R2:${R2_BUCKET}/${SEG}"
          echo ">>> Publishing ${REPO_DIR}/.latest/  ->  ${DEST}  (endpoint host: ${ACCT}.r2...)"
          # Run rclone on the VM (where the repo lives); pass R2 creds inline via env.
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "env \
               RCLONE_CONFIG_R2_TYPE='$RCLONE_CONFIG_R2_TYPE' \
               RCLONE_CONFIG_R2_PROVIDER='$RCLONE_CONFIG_R2_PROVIDER' \
               RCLONE_CONFIG_R2_ACCESS_KEY_ID='$RCLONE_CONFIG_R2_ACCESS_KEY_ID' \
               RCLONE_CONFIG_R2_SECRET_ACCESS_KEY='$RCLONE_CONFIG_R2_SECRET_ACCESS_KEY' \
               RCLONE_CONFIG_R2_ENDPOINT='$ENDPOINT' \
               RCLONE_CONFIG_R2_REGION='$RCLONE_CONFIG_R2_REGION' \
               RCLONE_CONFIG_R2_ACL='$RCLONE_CONFIG_R2_ACL' \
               rclone sync --copy-links --checksum --fast-list --transfers 16 \
                 --exclude 'logs/**' --exclude 'logs' \
                 --exclude '.building/**' --exclude '.real_*/**' --exclude '.cache/**' \
                 '${REPO_DIR}/.latest/' '${DEST}/'"
          echo ">>> Done. Smoke test from a FreeSense box: pkg update -f && pkg search -q FreeSense"

      - name: Publish channel manifest to R2 (repos.manifest)
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID_RAW: ${{ secrets.R2_ACCOUNT_ID }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACL: private
        run: |
          # The build stages the authoritative channel manifest here; serve it at
          # the bucket root so FreeSense-repoc can fetch pkg.freesense.org/repos.manifest
          # and discover channels (incl. ones added after a box was installed).
          MANIFEST="/root/freesense-src/tmp/stage-dir/usr/local/share/FreeSense/repos.manifest"
          if ! ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" "test -f '$MANIFEST'"; then
            echo "::warning::no staged repos.manifest ($MANIFEST) — skipping manifest publish"
            exit 0
          fi
          ACCT=$(printf '%s' "$R2_ACCOUNT_ID_RAW" | tr -d '[:space:]' \
                 | sed -e 's#^https\?://##' -e 's#\.r2\.cloudflarestorage\.com.*##' -e 's#/.*##')
          ENDPOINT="https://${ACCT}.r2.cloudflarestorage.com"
          echo ">>> Publishing ${MANIFEST}  ->  R2:${R2_BUCKET}/repos.manifest"
          ssh -i "$VMKEY" -o StrictHostKeyChecking=no -o BatchMode=yes "$VM" \
            "env \
               RCLONE_CONFIG_R2_TYPE='$RCLONE_CONFIG_R2_TYPE' \
               RCLONE_CONFIG_R2_PROVIDER='$RCLONE_CONFIG_R2_PROVIDER' \
               RCLONE_CONFIG_R2_ACCESS_KEY_ID='$RCLONE_CONFIG_R2_ACCESS_KEY_ID' \
               RCLONE_CONFIG_R2_SECRET_ACCESS_KEY='$RCLONE_CONFIG_R2_SECRET_ACCESS_KEY' \
               RCLONE_CONFIG_R2_ENDPOINT='$ENDPOINT' \
               RCLONE_CONFIG_R2_REGION='$RCLONE_CONFIG_R2_REGION' \
               RCLONE_CONFIG_R2_ACL='$RCLONE_CONFIG_R2_ACL' \
               rclone copyto --checksum '${MANIFEST}' 'R2:${R2_BUCKET}/repos.manifest'"
          echo ">>> Manifest published."
