name: Feature request
description: Suggest an idea or enhancement for FreeSense
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for FreeSense? Please check existing issues and
        [Discussions](https://github.com/FreeSense-org/freesense/discussions) first.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like FreeSense to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
